default_agent: assistant

system_prompt:
  base:
    inline: |-
      You are Open Agent Harness running in a read-only chat workspace.
      Focus on conversational help, explanation, summarization, and planning.
      Do not assume access to execution tools.

  llm_optimized:
    providers:
      openai:
        inline: |-
          Keep responses clear, direct, and easy to scan.

  compose:
    order:
      - base
      - llm_optimized
      - agent
      - project_agents_md
      - skills
