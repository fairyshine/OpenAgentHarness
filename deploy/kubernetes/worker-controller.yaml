apiVersion: apps/v1
kind: Deployment
metadata:
  name: oah-worker-controller
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: oah-worker-controller
  template:
    metadata:
      labels:
        app.kubernetes.io/name: oah-worker-controller
    spec:
      serviceAccountName: oah-worker-controller
      containers:
        - name: worker-controller
          image: ghcr.io/open-agent-harness/open-agent-harness:latest
          imagePullPolicy: IfNotPresent
          command: ["node", "apps/worker-controller/dist/index.js", "--config", "/etc/oah/server.yaml"]
          env:
            - name: OAH_CONFIG
              value: /etc/oah/server.yaml
            - name: OAH_WORKER_CONTROLLER_LEADER_ELECTION_TYPE
              value: kubernetes
            - name: OAH_WORKER_CONTROLLER_LEASE_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OAH_WORKER_CONTROLLER_LEASE_NAME
              value: oah-worker-controller
            - name: OAH_WORKER_CONTROLLER_TARGET_TYPE
              value: kubernetes
            - name: OAH_WORKER_CONTROLLER_TARGET_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OAH_WORKER_CONTROLLER_TARGET_DEPLOYMENT
              value: oah-worker
            - name: OAH_WORKER_CONTROLLER_ALLOW_SCALE_DOWN
              value: "false"
          volumeMounts:
            - name: oah-config
              mountPath: /etc/oah
              readOnly: true
      volumes:
        - name: oah-config
          configMap:
            name: oah-config
